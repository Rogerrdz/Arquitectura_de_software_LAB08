name: Terraform Azure

on:
  pull_request:
    paths:
      - "infra/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment (dev|prod)"
        required: true
        default: "dev"
      confirm_apply:
        description: "Type APPLY to run terraform apply"
        required: true
        default: "NO"

env:
  TF_WORKING_DIR: infra
  TF_VARFILE_DEV: env/dev.tfvars
  TF_VARFILE_PROD: env/prod.tfvars

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate-and-plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Fmt Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan (dev)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -var-file=${{ env.TF_VARFILE_DEV }} -out=plan.tfplan

      - name: Save Plan Text
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -no-color plan.tfplan > plan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-pr-${{ github.event.pull_request.number }}
          path: infra/plan.txt

      - name: Comment Plan Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const snippet = plan.length > 65000 ? plan.slice(0, 65000) + '\n... (truncated)' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform plan (dev)\n\n\`\`\`\n${snippet}\n\`\`\``
            });

  apply:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_apply == 'APPLY'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Select Var File
        id: varfile
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "file=${{ env.TF_VARFILE_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "file=${{ env.TF_VARFILE_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -var-file=${{ steps.varfile.outputs.file }} -out=apply.tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve apply.tfplan
